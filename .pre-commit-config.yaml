repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: ruff-format
        name: ruff-format
        entry: uv run ruff format extract lambda/stream_unzip_s3.py tests/airbnb tests/include
        language: system
        types: [python]
        pass_filenames: false
      - id: ruff-check
        name: ruff-check
        entry: uv run ruff check extract lambda/stream_unzip_s3.py tests/airbnb tests/include
        language: system
        types: [python]
        pass_filenames: false
