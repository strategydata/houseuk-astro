repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff-check
        entry: uv run ruff check extract lambda/stream_unzip_s3.py tests/airbnb tests/include
        language: system
        types: [python]
      - id: ruff-format
        name: ruff-format
        entry: uv run ruff format extract lambda/stream_unzip_s3.py tests/airbnb tests/include
        language: system
        types: [python]
