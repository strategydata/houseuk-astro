name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  python-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync --frozen --group dev --group docs

      - name: Pre-commit Ruff
        run: |
          uv run pre-commit run ruff-check
          uv run pre-commit run ruff-format

      - name: Mypy
        run: uv run mypy

      - name: Pytest
        run: uv run pytest tests/airbnb tests/include

      - name: Build docs
        run: uv run mkdocs build
