name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  docs-required:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enforce docs update for new ingestion/orchestration files
        shell: bash
        run: |
          set -euo pipefail

          BASE_REF="${{ github.base_ref }}"
          git fetch origin "${BASE_REF}" --depth=1

          CREATED_FILES="$(git diff --name-only --diff-filter=A "origin/${BASE_REF}...HEAD")"
          CHANGED_FILES="$(git diff --name-only "origin/${BASE_REF}...HEAD")"

          CREATED_TARGET_FILES="$(echo "${CREATED_FILES}" | grep -E '^(dags/|extract/|include/|lambda/)' || true)"
          DOCS_CHANGED="$(echo "${CHANGED_FILES}" | grep -E '^(docs/|README\.md$|CHANGELOG\.md$|extract/.*/README\.md$)' || true)"

          if [[ -n "${CREATED_TARGET_FILES}" && -z "${DOCS_CHANGED}" ]]; then
            echo "New files were created under dags/extract/include/lambda but no docs updates were found."
            echo "Created files:"
            echo "${CREATED_TARGET_FILES}"
            echo ""
            echo "Please update at least one of:"
            echo "- docs/**"
            echo "- README.md"
            echo "- CHANGELOG.md"
            echo "- extract/**/README.md"
            exit 1
          fi

          echo "Docs gate passed."

  python-quality:
    runs-on: ubuntu-latest
    env:
      COV_FAIL_UNDER: "60"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync --frozen --group dev --group docs

      - name: Pre-commit Ruff
        run: |
          uv run pre-commit run ruff-check
          uv run pre-commit run ruff-format

      - name: Mypy
        run: uv run mypy

      - name: Pytest (push)
        if: github.event_name != 'pull_request'
        run: uv run pytest

      - name: Pytest Coverage Gate (pull_request)
        if: github.event_name == 'pull_request'
        run: |
          uv run pytest \
            --cov=extract \
            --cov=include \
            --cov=dags \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=${{ env.COV_FAIL_UNDER }}

      - name: Build Coverage Summary
        id: coverage
        if: github.event_name == 'pull_request'
        run: |
          python - <<'PY'
          import os
          import xml.etree.ElementTree as ET
          from pathlib import Path

          coverage_xml = Path("coverage.xml")
          if not coverage_xml.exists():
              raise SystemExit("coverage.xml was not generated")

          root = ET.parse(coverage_xml).getroot()
          line_rate = float(root.attrib.get("line-rate", "0")) * 100
          covered = int(root.attrib.get("lines-covered", "0"))
          total = int(root.attrib.get("lines-valid", "0"))
          threshold = float(os.environ.get("COV_FAIL_UNDER", "0"))

          summary = (
              "## Test Coverage\n"
              f"- Line coverage: `{line_rate:.2f}%`\n"
              f"- Threshold: `{threshold:.2f}%`\n"
              f"- Covered lines: `{covered}` / `{total}`\n"
          )

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as fh:
              fh.write(summary + "\n")

          with open("coverage-summary.md", "w", encoding="utf-8") as fh:
              fh.write(summary + "\n")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"line_rate={line_rate:.2f}\n")
              fh.write(f"lines_covered={covered}\n")
              fh.write(f"lines_total={total}\n")
          PY

      - name: Upload Coverage Artifacts
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            coverage-summary.md

      - name: Comment Coverage on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const marker = '<!-- coverage-report -->';
            const body = `${marker}
            ## Coverage Report
            - Line coverage: \`${{ steps.coverage.outputs.line_rate }}%\`
            - Threshold: \`${{ env.COV_FAIL_UNDER }}%\`
            - Covered lines: \`${{ steps.coverage.outputs.lines_covered }}\` / \`${{ steps.coverage.outputs.lines_total }}\`
            `;
            const issue_number = context.issue.number;
            const { owner, repo } = context.repo;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((c) => c.user.type === 'Bot' && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Build docs
        run: uv run mkdocs build
