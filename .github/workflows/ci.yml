name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  python-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync --frozen --group dev --group docs

      - name: Ruff
        run: uv run ruff check extract lambda/stream_unzip_s3.py tests/airbnb tests/include

      - name: Mypy
        run: uv run mypy

      - name: Pytest
        run: uv run pytest tests/airbnb tests/include

      - name: Build docs
        run: uv run mkdocs build

  rust-lambda-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo test
        working-directory: lambda/s3_file_router
        run: cargo test --locked
